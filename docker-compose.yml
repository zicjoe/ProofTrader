services:
  postgres:
    image: postgres:16
    container_name: prooftrader-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: prooftrader
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - prooftrader_postgres_data:/var/lib/postgresql/data

volumes:
  prooftrader_postgres_data:
